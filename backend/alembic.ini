# Alembic configuration file.

[alembic]
# Path to migration environment
script_location = alembic

# Naming convention for migration revisions
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps (UTC recommended)
timezone = UTC

# sys.path prepend for the migration env — allows importing app modules
prepend_sys_path = .

# Template used for generating new revision files
# file_template = %%(rev)s_%%(slug)s

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the env.py module in "offline" mode
# offline = false

# Version location precedence
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator; you should generally NOT change this
# version_path_separator = os

# Database URL — sourced from env var in env.py, not hardcoded here
sqlalchemy.url =

[post_write_hooks]
# Uncomment to run ruff after autogenerating migrations
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
